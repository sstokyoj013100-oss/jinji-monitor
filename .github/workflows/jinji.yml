name: Jinji Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '7 0 * * *' # 日本時間の毎日午前09:07に実行

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Download previous detection history
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: jinji-history-data
        path: .

    - name: Install dependencies
      run: pip install requests beautifulsoup4 pdfplumber

    - name: Run logic
      env:
        PYTHONUNBUFFERED: "1"
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: python main.py

    - name: Upload updated detection history
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jinji-history-data
        path: detection_history.json
        overwrite: true
