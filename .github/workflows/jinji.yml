name: Jinji Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '7 0 * * *' # 日本時間の毎日午前09:07に実行

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    # --- 大幅変更: キャッシュではなく前日の履歴ファイル(Artifact)をダウンロードして復元 ---
    - name: Download previous detection history
      uses: actions/download-artifact@v4
      continue-on-error: true # 初回実行時などで履歴がない場合でもエラーにせず次に進める
      with:
        name: jinji-history-data
        path: .

    - name: Install dependencies
      run: pip install requests beautifulsoup4 pdfplumber

    - name: Run logic
      env:
        PYTHONUNBUFFERED: "1"
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: python main.py

    # --- 大幅変更: 実行終了後、新しく更新された履歴ファイルをArtifactとしてアップロード保管 ---
    - name: Upload updated detection history
      if: always() # 万が一エラーが起きても現在のデータを失わないよう常に保護
      uses: actions/upload-artifact@v4
      with:
        name: jinji-history-data
        path: detection_history.json
        overwrite: true # 毎日最新データに上書き保存
