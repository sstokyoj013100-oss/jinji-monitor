name: Jinji Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '7 0 * * *' # 日本時間の毎日午前09:07に実行

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    # 1. 【超重要】前回の実行時に保存した履歴ファイルを保管庫から取り出す
    - name: Download previous detection history safely
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: jinji-history-data
        path: .
        missing-artifact-error: false

    - name: Install dependencies
      run: pip install requests beautifulsoup4 pdfplumber

    # 2. プログラムを実行（ここで上の取り出した履歴が読み込まれます）
    - name: Run logic
      env:
        PYTHONUNBUFFERED: "1"
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: python main.py

    # 3. 【超重要】今回新しく更新された履歴ファイルをGitHubの保管庫に預ける
    - name: Upload updated detection history
      if: always() # 万が一途中でエラーが起きても履歴を失わないために必ず実行
      uses: actions/upload-artifact@v4
      with:
        name: jinji-history-data
        path: detection_history.json
        if-no-files-found: ignore
