name: Jinji Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '7 0 * * *' # 日本時間の毎日午前09:07に実行

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    # --- 【大幅改良】公式部品のエラーを回避し、安全に過去の履歴取得を試みる ---
    - name: Download previous detection history safely
      run: |
        echo "=== 過去の履歴データの復元を試みます ==="
        # GitHub CLIを使って、過去のアーティファクトが存在するかチェックしてダウンロード
        gh artifact download --name jinji-history-data --dir . || echo "過去の履歴データが見つかりません（初回実行または期限切れ）。新規作成して続行します。"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Install dependencies
      run: pip install requests beautifulsoup4 pdfplumber

    - name: Run logic
      env:
        PYTHONUNBUFFERED: "1"
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: python main.py

    # --- 実行終了後、新しく更新された履歴ファイルをArtifactとしてアップロード保管 ---
    - name: Upload updated detection history
      if: always() # 万が一途中でエラーが起きても現在のデータを失わないよう必ず実行
      run: |
        if [ -f "detection_history.json" ]; then
          echo "=== 最新の履歴データを保存します ==="
          gh artifact upload --name jinji-history-data detection_history.json
        else
          echo "警告: 保存対象の履歴ファイル(detection_history.json)が生成されていません。"
        fi
      env:
        GH_TOKEN: ${{ github.token }}
