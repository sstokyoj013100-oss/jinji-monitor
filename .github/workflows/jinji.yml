name: Jinji Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '7 0 * * *' # 日本時間の毎日午前09:07に実行

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    # actions/cache を使用して、前回の成果物 (detection_history.json) を引き継ぐ
    - name: Restore detection history cache
      id: history-cache
      uses: actions/cache/restore@v4
      with:
        path: detection_history.json
        key: jinji-history-v3-${{ github.run_id }}
        restore-keys: |
          jinji-history-v3-

    - name: Install dependencies
      run: pip install requests beautifulsoup4 pdfplumber

    # プログラムの実行 (スクリプト名: main.py)
    # ※もし先ほど修正したファイル名が「main2.txt」のままであれば、ここを main2.txt に変更してください。
    - name: Run logic
      env:
        PYTHONUNBUFFERED: "1"
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: python main.py

    # 万が一、プログラムからファイルが生成されなかった場合の保険処理
    - name: Ensure history file exists
      if: always()
      run: |
        if [ ! -f "detection_history.json" ]; then
          echo '{"hits": [], "warnings": []}' > detection_history.json
          echo "警告: detection_history.json が見つからなかったため、空のファイルを生成しました。"
        fi

    # 新しく更新された履歴を、次回の実行（明日）のためにキャッシュへ保存
    - name: Save detection history cache
      if: always()
      uses: actions/cache/save@v4
      with:
        path: detection_history.json
        key: jinji-history-v3-${{ github.run_id }}
