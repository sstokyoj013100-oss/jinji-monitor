name: Jinji Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '7 0 * * *' # 日本時間の毎日午前09:07に実行

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    # 1. 保管庫の名前を「jinji-history-v2」に一新してダウンロードを試みる
    - name: Download previous detection history safely
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: jinji-history-v2
        path: .

    - name: Install dependencies
      run: pip install requests beautifulsoup4 pdfplumber

    # 2. プログラムの実行
    - name: Run logic
      env:
        PYTHONUNBUFFERED: "1"
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: python main.py

    # 3. ファイルがなければ強制生成
    - name: Upload updated detection history
      if: always()
      run: |
        if [ ! -f "detection_history.json" ]; then
          echo '{"hits": [], "warnings": []}' > detection_history.json
          echo "警告: プログラムからファイルが生成されなかったため、空のファイルを新規作成しました。"
        fi
    
    # 4. 保管庫の保存名も「jinji-history-v2」に統一して確実にアップロード
    - name: Archive history file to GitHub Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jinji-history-v2
        path: detection_history.json
