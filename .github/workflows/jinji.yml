name: Jinji Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '7 0 * * *' # 日本時間の毎日午前09:07に実行

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    # actions/cache を使用して、前回の detection_history.json を復元する
    - name: Restore detection history cache
      id: history-cache
      uses: actions/cache/restore@v4
      with:
        path: detection_history.json
        key: jinji-history-v3-${{ github.run_id }}
        restore-keys: |
          jinji-history-v3-

    - name: Install dependencies
      run: pip install requests beautifulsoup4 pdfplumber

    # プログラムの実行 (実行ファイル名を main.py に統一)
    - name: Run logic
      env:
        PYTHONUNBUFFERED: "1"
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: python main.py

    # ファイルが存在しない場合は空のファイルを生成
    - name: Ensure history file exists
      if: always()
      run: |
        if [ ! -f "detection_history.json" ]; then
          echo '{"hits": [], "warnings": []}' > detection_history.json
          echo "警告: プログラムからファイルが生成されなかったため、空のファイルを新規作成しました。"
        fi

    # 新しく更新された detection_history.json を次回の実行のためにキャッシュとして保存
    - name: Save detection history cache
      if: always()
      uses: actions/cache/save@v4
      with:
        path: detection_history.json
        key: jinji-history-v3-${{ github.run_id }}
