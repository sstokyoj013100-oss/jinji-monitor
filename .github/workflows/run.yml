name: Jinji Monitor
on:
  schedule:
    - cron: '0 0 * * *' # 日本時間の毎日午前9時に実行
jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install requests beautifulsoup4 pdfplumber
    - name: Run logic
      run: python main.py
